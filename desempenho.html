<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HermesMed — Desempenho</title>
<script src="auth.js"></script>
<style>
  :root {
    --bg: #0d0d0d; --card: #1a1a2e; --text: #e8e8f0; --muted: #8888aa;
    --accent: #7c5cfc; --accent2: #5ac8fa; --correct: #34c759; --wrong: #ff3b30;
    --yellow: #ff9f0a; --orange: #ff6b35; --pink: #ff6b9d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 600px; margin: 0 auto; padding: 0 14px 60px; }
  .topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 0; position: sticky; top: 0; z-index: 10;
    background: var(--bg); backdrop-filter: blur(8px);
  }
  .topbar a { text-decoration: none; font-size: 1.3rem; color: var(--accent); }
  .topbar .title { font-weight: 700; font-size: 1rem; }
  .topbar .sub { font-size: 0.78rem; color: var(--muted); }
  
  /* ─── Cards ─── */
  .card {
    background: var(--card); border-radius: 14px; padding: 18px;
    margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.04);
  }
  .card h2 { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.3px; }
  .card h3 { font-size: 0.9rem; margin-bottom: 10px; }
  
  /* ─── Stats Grid ─── */
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  }
  .stat-item { text-align: center; padding: 10px 4px; }
  .stat-num { font-size: 1.6rem; font-weight: 800; line-height: 1.2; }
  .stat-label { font-size: 0.7rem; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.3px; }
  .stat-score { font-size: 2.2rem; font-weight: 900; line-height: 1.1; }
  
  /* ─── Big Card ─── */
  .big-score {
    text-align: center; padding: 24px 10px;
  }
  .big-score .score { font-size: 3.2rem; font-weight: 900; line-height: 1; }
  .big-score .label { font-size: 0.82rem; color: var(--muted); margin: 6px 0 12px; }
  .big-score .sub { font-size: 0.78rem; color: var(--muted); }
  
  /* ─── Bar chart ─── */
  .bar-area { margin-bottom: 12px; }
  .bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 0.82rem; }
  .bar-header .area-name { font-weight: 600; }
  .bar-header .area-pct { color: var(--muted); font-size: 0.75rem; }
  .bar-track {
    height: 22px; border-radius: 12px; background: rgba(255,255,255,0.05);
    overflow: hidden; display: flex;
  }
  .bar-correct {
    height: 100%; background: linear-gradient(135deg, var(--correct), #2bac4a);
    transition: width 0.6s ease;
  }
  .bar-wrong {
    height: 100%; background: linear-gradient(135deg, var(--wrong), #cc2f26);
    transition: width 0.6s ease;
  }
  .bar-none { height: 100%; background: rgba(255,255,255,0.04); }
  .bar-area .bar-info {
    display: flex; justify-content: space-between; font-size: 0.7rem;
    color: var(--muted); margin-top: 2px;
  }
  
  /* ─── Table ─── */
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th { text-align: left; padding: 6px 4px; color: var(--muted); font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.06); }
  td { padding: 6px 4px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .td-certo { color: var(--correct); font-weight: 700; }
  .td-errado { color: var(--wrong); font-weight: 700; }
  
  /* ─── Sim card ─── */
  .sim-item {
    padding: 12px; border-radius: 10px;
    background: rgba(124,92,252,0.06); margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .sim-item .s-left { flex: 1; }
  .sim-item .s-title { font-weight: 600; font-size: 0.85rem; }
  .sim-item .s-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .sim-item .s-score { font-size: 1.1rem; font-weight: 800; }
  
  /* ─── Empty ─── */
  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state h3 { color: var(--text); margin-bottom: 6px; }
  
  /* ─── Legend ─── */
  .legend { display: flex; gap: 14px; justify-content: center; margin: 10px 0; font-size: 0.78rem; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  
  /* ─── Colors ─── */
  .cor-clinica-medica { color: #7c5cfc; }
  .cor-cirurgia { color: #ff6b6b; }
  .cor-pediatria { color: #5ac8fa; }
  .cor-ginecologia { color: #ff8a80; }
  .cor-medicina-preventiva { color: #34c759; }
  .cor-medicina-intensiva { color: #ff9500; }
  .cor-emergencia { color: #ff3b30; }
  .cor-ortopedia { color: #af52de; }
  .cor-oftalmologia { color: #30d158; }
  .cor-otorrino { color: #64d2ff; }
  .cor-dermatologia { color: #ff9f0a; }
  .cor-psiquiatria { color: #bf5af2; }
  .cor-geriatria { color: #5e5ce6; }
  .cor-infectologia { color: #30b0c7; }
  .cor-nefrologia { color: #64b5f6; }
  .cor-reumatologia { color: #ce93d8; }
  .cor-geral { color: #888; }
  
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --muted: #8e8e93;
    }
    .topbar { background: var(--bg); }
    .card { border-color: rgba(0,0,0,0.06); }
    .bar-track { background: rgba(0,0,0,0.06); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <a href="index.html">←</a>
    <div>
      <div class="title">📊 Desempenho</div>
      <div class="sub" id="pageSub">Carregando...</div>
    </div>
  </div>

  <div id="content"></div>
</div>

<script>
// ─── Áreas (mesmo array do index) ───
const AREAS = [
  { id: 'clinica-medica',    icon: '🫁', name: 'Clínica Médica', cor: '#7c5cfc' },
  { id: 'cirurgia',          icon: '🔪', name: 'Cirurgia', cor: '#ff6b6b' },
  { id: 'pediatria',         icon: '👶', name: 'Pediatria', cor: '#5ac8fa' },
  { id: 'ginecologia',       icon: '🩺', name: 'Ginecologia e Obstetrícia', cor: '#ff8a80' },
  { id: 'medicina-preventiva', icon: '🛡️', name: 'Medicina Preventiva', cor: '#34c759' },
  { id: 'medicina-intensiva', icon: '💉', name: 'Medicina Intensiva', cor: '#ff9500' },
  { id: 'emergencia',        icon: '🚑', name: 'Emergência e Trauma', cor: '#ff3b30' },
  { id: 'ortopedia',         icon: '🦴', name: 'Ortopedia', cor: '#af52de' },
  { id: 'oftalmologia',      icon: '👁️', name: 'Oftalmologia', cor: '#30d158' },
  { id: 'otorrino',          icon: '👂', name: 'Otorrinolaringologia', cor: '#64d2ff' },
  { id: 'dermatologia',      icon: '🧴', name: 'Dermatologia', cor: '#ff9f0a' },
  { id: 'psiquiatria',       icon: '🧠', name: 'Psiquiatria', cor: '#bf5af2' },
  { id: 'geriatria',         icon: '👴', name: 'Geriatria', cor: '#5e5ce6' },
  { id: 'infectologia',      icon: '🦠', name: 'Infectologia', cor: '#30b0c7' },
  { id: 'nefrologia',        icon: '🔬', name: 'Nefrologia', cor: '#64b5f6' },
  { id: 'reumatologia',      icon: '🦵', name: 'Reumatologia', cor: '#ce93d8' },
];

const SIMULADOS_INFO = {
  '14-simulado': { nome: '14° Simulado Residência Médica - ENAMED', data: '2026-06-28' }
};

const mapAreaId = {
  'clinica-medica': 'Clínica Médica',
  'cirurgia': 'Cirurgia',
  'pediatria': 'Pediatria',
  'ginecologia': 'Ginecologia e Obstetrícia',
  'medicina-preventiva': 'Medicina Preventiva',
  'medicina-intensiva': 'Medicina Intensiva',
  'emergencia': 'Emergência e Trauma',
  'ortopedia': 'Ortopedia',
  'oftalmologia': 'Oftalmologia',
  'otorrino': 'Otorrinolaringologia',
  'dermatologia': 'Dermatologia',
  'psiquiatria': 'Psiquiatria',
  'geriatria': 'Geriatria',
  'infectologia': 'Infectologia',
  'nefrologia': 'Nefrologia',
  'reumatologia': 'Reumatologia',
  'geral': 'Geral'
};

function getAreaIcon(id) {
  const a = AREAS.find(x => x.id === id);
  return a ? a.icon : '📚';
}
function getAreaName(id) {
  return mapAreaId[id] || id;
}

// ─── Carregar dados ───
async function carregar() {
  const sub = document.getElementById('pageSub');
  const content = document.getElementById('content');
  const log = JSON.parse(localStorage.getItem('hermesmed_log') || '[]');
  const hoje = new Date().toISOString().split('T')[0];
  const hojeLog = log.filter(e => e.timestamp?.startsWith(hoje));
  const logAcertos = hojeLog.filter(e => e.acertou === true).length;
  const logErros = hojeLog.filter(e => e.acertou === false).length;

  // 1. Progresso de questões avulsas
  const progQuestoes = JSON.parse(localStorage.getItem('hermesmed_progresso') || '{}');

  // 2. Progresso de simulados
  const progSimulados = JSON.parse(localStorage.getItem('hermesmed_simulados') || '{}');

  // 3. Flashcards
  const progFlashcards = JSON.parse(localStorage.getItem('hermesmed_flashcards') || '{}');

  // Carregar JSON de cada área pra saber total de questões
  const areasData = {};
  for (const area of AREAS) {
    try {
      const resp = await fetch(`data/${area.id}.json`);
      if (resp.ok) {
        const data = await resp.json();
        areasData[area.id] = data.questoes || [];
      }
    } catch {}
  }

  // Carregar simulados
  let simuladoQuestoes = [];
  try {
    const resp = await fetch('data/simulados/14-simulado.json');
    if (resp.ok) {
      const data = await resp.json();
      simuladoQuestoes = data.questoes || [];
    }
  } catch {}

  // ─── Consolidar ───
  // Questões avulsas — suporta formato booleano puro E objeto {acertou: bool}
  const areasStats = {};
  for (const area of AREAS) {
    const questoes = areasData[area.id] || [];
    const progresso = progQuestoes[area.id] || {};
    let acertos = 0, erros = 0, respondidas = 0;
    for (const q of questoes) {
      const r = progresso[String(q.id)];
      if (r === undefined || r === null) continue; // não respondida
      respondidas++;
      let acertou = false;
      if (r === true || r === 'true') acertou = true;
      else if (r === false || r === 'false') acertou = false;
      else if (typeof r === 'object') acertou = r.acertou === true || r.acertou === 'true';
      else continue;
      if (acertou) acertos++;
      else erros++;
    }
    areasStats[area.id] = {
      total: questoes.length,
      respondidas,
      acertos,
      erros,
      pct: respondidas > 0 ? Math.round(acertos / respondidas * 100) : 0
    };
  }

  // Simulados
  const simStats = [];
  for (const [simId, dados] of Object.entries(progSimulados)) {
    if (!dados.concluido && !dados.respostas) continue;
    const respostas = dados.respostas || {};
    const concluido = dados.concluido || false;
    const questSim = simuladoQuestoes;
    
    // Contar por área no simulado
    let totalResp = 0, totalAcertos = 0;
    const areaSim = {};
    for (const q of questSim) {
      const r = respostas[q.id];
      if (r === 'certo') { totalAcertos++; totalResp++; }
      else if (r === 'errado') { totalResp++; }
      else continue;
      
      const aNome = q.area || 'Geral';
      if (!areaSim[aNome]) areaSim[aNome] = { acertos: 0, total: 0 };
      areaSim[aNome].total++;
      if (r === 'certo') areaSim[aNome].acertos++;
    }

    simStats.push({
      id: simId,
      info: SIMULADOS_INFO[simId] || { nome: simId },
      total: questSim.length,
      respondidas: totalResp,
      acertos: totalAcertos,
      pct: totalResp > 0 ? Math.round(totalAcertos / totalResp * 100) : 0,
      concluido,
      areas: areaSim
    });
  }

  // ─── Renderizar ───
  const totalGeral = Object.values(areasStats).reduce((s, a) => s + a.respondidas, 0);
  const acertosGeral = Object.values(areasStats).reduce((s, a) => s + a.acertos, 0);
  const pctGeral = totalGeral > 0 ? Math.round(acertosGeral / totalGeral * 100) : 0;
  const totalSimRespondidas = simStats.reduce((s, sim) => s + sim.respondidas, 0);
  const totalSimAcertos = simStats.reduce((s, sim) => s + sim.acertos, 0);
  const totalFlashcards = Object.keys(progFlashcards).length;

  const totalRespondidas = totalGeral + totalSimRespondidas;
  const totalAcertos = acertosGeral + totalSimAcertos;
  const totalPct = totalRespondidas > 0 ? Math.round(totalAcertos / totalRespondidas * 100) : 0;

  sub.textContent = `${totalRespondidas} questões respondidas`;

  if (totalRespondidas === 0) {
    let emptyHtml = `
      <div class="empty-state">
        <div class="icon">📊</div>
        <h3>Nenhum dado ainda</h3>
        <p>Resolva questões e faça simulados para ver seu desempenho aqui!</p>
        <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
          <a href="questoes.html" class="card" style="padding:14px 20px;text-decoration:none;color:var(--accent);font-weight:600;">
            🎯 Resolver questões
          </a>
          <a href="simulados.html" class="card" style="padding:14px 20px;text-decoration:none;color:var(--accent);font-weight:600;">
            📝 Fazer simulado
          </a>
        </div>
      </div>`;

    // Se tem log de hoje, mostra mesmo sem progresso consolidado
    if (hojeLog.length > 0) {
      const pctHoje = Math.round(logAcertos / hojeLog.length * 100);
      emptyHtml += `<div class="card">
        <h2>📅 Hoje</h2>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-num" style="color:var(--correct)">${logAcertos}</div>
            <div class="stat-label">Acertos</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" style="color:var(--wrong)">${logErros}</div>
            <div class="stat-label">Erros</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" style="color:var(--muted)">${hojeLog.length}</div>
            <div class="stat-label">Questões</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" style="color:var(--accent)">${pctHoje}%</div>
            <div class="stat-label">Aproveitamento</div>
          </div>
        </div>
        <div style="font-size:0.75rem;color:var(--textSecondary);margin-top:8px;text-align:center;">
          ⚡ Registrado no log de atividades
        </div>
      </div>`;
    }

    // Últimos 7 dias (se houver log)
    if (log.length > 0) {
      const ultimos7 = [...Array(7)].map((_, i) => {
        const d = new Date(Date.now() - i * 86400000);
        return d.toISOString().split('T')[0];
      }).reverse();
      const diasAtividade = ultimos7.map(dia => {
        const qs = log.filter(e => e.timestamp?.startsWith(dia));
        return { dia, total: qs.length, acertos: qs.filter(e => e.acertou === true).length, erros: qs.filter(e => e.acertou === false).length };
      });
      emptyHtml += `<div class="card"><h2>📈 Últimos 7 dias</h2>
        <div style="display:flex;gap:4px;align-items:flex-end;height:60px;padding:8px 0;">
          ${diasAtividade.map(d => {
            const h = d.total > 0 ? Math.min(50, d.total * 5) : 2;
            const cor = d.total > 0 ? (d.acertos >= d.erros ? 'var(--correct)' : 'var(--wrong)') : 'var(--muted)';
            const diaLabel = new Date(d.dia + 'T12:00:00').toLocaleDateString('pt-BR', { weekday: 'short' });
            return `<div style="flex:1;text-align:center;">
              <div style="height:${h}px;background:${cor};border-radius:4px 4px 0 0;margin:0 auto;max-width:28px;opacity:${d.total > 0 ? 0.9 : 0.3};transition:height 0.3s;"></div>
              <div style="font-size:0.6rem;color:var(--muted);margin-top:4px;">${diaLabel}</div>
              <div style="font-size:0.65rem;color:var(--text);font-weight:600;">${d.total}</div>
            </div>`;
          }).join('')}
        </div>
        <div style="text-align:center;font-size:0.75rem;color:var(--muted);margin-top:4px;">
          Total no log: <strong style="color:var(--text)">${log.length}</strong> eventos
          · <strong style="color:var(--correct)">${log.filter(e => e.acertou === true).length}</strong> acertos
          · <strong style="color:var(--wrong)">${log.filter(e => e.acertou === false).length}</strong> erros
        </div>
      </div>`;
    }

    // Botão config
    emptyHtml += `<div style="text-align:center;padding:8px 0;">
      <button onclick="toggleSyncPanel()" style="background:none;border:none;color:var(--muted);font-size:0.78rem;cursor:pointer;padding:8px 16px;border-radius:8px;">
        ⚙️ Configurações e sincronia
      </button>
    </div>`;

    content.innerHTML = emptyHtml;
    return;
  }

  // Resumo geral
  let html = `
    <div class="card big-score">
      <div class="score" style="background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        ${totalPct}%
      </div>
      <div class="label">Aproveitamento geral</div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-num" style="color:var(--correct)">${totalAcertos}</div>
          <div class="stat-label">Acertos</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" style="color:var(--wrong)">${totalRespondidas - totalAcertos}</div>
          <div class="stat-label">Erros</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" style="color:var(--muted)">${totalRespondidas}</div>
          <div class="stat-label">Respondidas</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" style="color:var(--yellow)">${totalFlashcards}</div>
          <div class="stat-label">Flashcards</div>
        </div>
      </div>
    </div>
  `;

  // Gráfico por área (questões avulsas)
  const areasComDados = AREAS.filter(a => areasStats[a.id].respondidas > 0);
  if (areasComDados.length > 0) {
    html += `<div class="card"><h2>📊 Desempenho por área</h2>`;
    
    for (const area of areasComDados) {
      const st = areasStats[area.id];
      const pct = st.pct;
      const totalBar = st.respondidas > 0 ? 100 : 0;
      const pctCerto = st.respondidas > 0 ? Math.round(st.acertos / st.respondidas * 100) : 0;
      const pctErrado = st.respondidas > 0 ? Math.round(st.erros / st.respondidas * 100) : 0;
      
      html += `
        <div class="bar-area">
          <div class="bar-header">
            <span class="area-name">${area.icon} ${area.name}</span>
            <span class="area-pct">${st.acertos}/${st.respondidas} · ${pct}%</span>
          </div>
          <div class="bar-track">
            ${st.acertos > 0 ? `<div class="bar-correct" style="width:${pctCerto}%"></div>` : ''}
            ${st.erros > 0 ? `<div class="bar-wrong" style="width:${pctErrado}%"></div>` : ''}
            ${st.respondidas < st.total ? `<div class="bar-none" style="width:${100 - pctCerto - pctErrado}%"></div>` : ''}
          </div>
          <div class="bar-info">
            <span>✅ ${st.acertos}</span>
            <span>❌ ${st.erros}</span>
            <span>📚 ${st.total - st.respondidas} pendentes</span>
          </div>
        </div>
      `;
    }
    html += `</div>`;

    // Tabela detalhada
    html += `<div class="card"><h2>📋 Tabela por área</h2>
      <table>
        <thead><tr><th>Área</th><th>Questões</th><th>Respondidas</th><th>Acertos</th><th>%</th></tr></thead>
        <tbody>
    `;
    for (const area of areasComDados) {
      const st = areasStats[area.id];
      html += `<tr>
        <td>${area.icon} ${area.name}</td>
        <td>${st.total}</td>
        <td>${st.respondidas}</td>
        <td class="td-certo">${st.acertos}</td>
        <td style="font-weight:700;color:${st.pct >= 70 ? 'var(--correct)' : st.pct >= 40 ? 'var(--yellow)' : 'var(--wrong)'}">${st.pct}%</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }

  // Simulados
  if (simStats.length > 0) {
    html += `<div class="card"><h2>📝 Simulados</h2>`;
    for (const sim of simStats.sort((a, b) => b.concluido - a.concluido)) {
      const icon = sim.concluido ? '🏁' : '🔄';
      const cor = sim.pct >= 70 ? 'var(--correct)' : sim.pct >= 40 ? 'var(--yellow)' : 'var(--wrong)';
      html += `
        <div class="sim-item" onclick="location.href='simulados.html'" style="cursor:pointer;">
          <div class="s-left">
            <div class="s-title">${icon} ${sim.info.nome}</div>
            <div class="s-meta">${sim.respondidas}/${sim.total} · ${sim.acertos} acertos</div>
          </div>
          <div class="s-score" style="color:${cor}">${sim.pct}%</div>
        </div>
      `;

      // Detalhamento por área dentro do simulado
      if (Object.keys(sim.areas).length > 0) {
        html += `<div style="margin:-4px 0 8px 12px;font-size:0.75rem;">`;
        for (const [aNome, aDados] of Object.entries(sim.areas)) {
          const aPct = aDados.total > 0 ? Math.round(aDados.acertos / aDados.total * 100) : 0;
          const corA = aPct >= 70 ? 'var(--correct)' : aPct >= 40 ? 'var(--yellow)' : 'var(--wrong)';
          html += `<span style="color:var(--muted);margin-right:10px;">${aNome}: <span style="color:${corA};font-weight:600;">${aDados.acertos}/${aDados.total}</span></span>`;
        }
        html += `</div>`;
      }
    }
    html += `</div>`;
  }

  // Flashcards
  if (totalFlashcards > 0) {
    html += `<div class="card"><h2>🃏 Flashcards</h2>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-num" style="color:var(--accent)">${totalFlashcards}</div>
          <div class="stat-label">Total de flashcards</div>
        </div>
      </div>
    </div>`;
  }

  // ─── Atividade recente (do log) ───
  if (hojeLog.length > 0) {
    html += `<div class="card">
      <h2>📅 Hoje</h2>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-num" style="color:var(--correct)">${logAcertos}</div>
          <div class="stat-label">Acertos</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" style="color:var(--wrong)">${logErros}</div>
          <div class="stat-label">Erros</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" style="color:var(--muted)">${hojeLog.length}</div>
          <div class="stat-label">Questões</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" style="color:var(--accent)">${hojeLog.length > 0 ? Math.round(logAcertos / hojeLog.length * 100) : 0}%</div>
          <div class="stat-label">Aproveitamento</div>
        </div>
      </div>
    </div>`;
  }

  // ─── Últimos 7 dias ───
  const ultimos7 = [...Array(7)].map((_, i) => {
    const d = new Date(Date.now() - i * 86400000);
    return d.toISOString().split('T')[0];
  }).reverse();
  
  const diasAtividade = ultimos7.map(dia => {
    const qs = log.filter(e => e.timestamp?.startsWith(dia));
    const ac = qs.filter(e => e.acertou === true).length;
    const er = qs.filter(e => e.acertou === false).length;
    return { dia, total: qs.length, acertos: ac, erros: er };
  });

  if (log.length > 0) {
    html += `<div class="card"><h2>📈 Últimos 7 dias</h2>
      <div style="display:flex;gap:4px;align-items:flex-end;height:60px;padding:8px 0;">
        ${diasAtividade.map(d => {
          const h = d.total > 0 ? Math.min(50, d.total * 5) : 2;
          const cor = d.total > 0 ? (d.acertos >= d.erros ? 'var(--correct)' : 'var(--wrong)') : 'var(--muted)';
          const diaLabel = new Date(d.dia + 'T12:00:00').toLocaleDateString('pt-BR', { weekday: 'short' });
          return `<div style="flex:1;text-align:center;">
            <div style="height:${h}px;background:${cor};border-radius:4px 4px 0 0;margin:0 auto;max-width:28px;opacity:${d.total > 0 ? 0.9 : 0.3};transition:height 0.3s;"></div>
            <div style="font-size:0.6rem;color:var(--muted);margin-top:4px;">${diaLabel}</div>
            <div style="font-size:0.65rem;color:var(--text);font-weight:600;">${d.total}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="text-align:center;font-size:0.75rem;color:var(--muted);margin-top:4px;">
        Total no log: <strong style="color:var(--text)">${log.length}</strong> eventos
        · <strong style="color:var(--correct)">${log.filter(e => e.acertou === true).length}</strong> acertos
        · <strong style="color:var(--wrong)">${log.filter(e => e.acertou === false).length}</strong> erros
      </div>
    </div>`;
  }

  // ⚙️ Botão Configurações/Sync
  html += `<div style="text-align:center;padding:8px 0;">
    <button onclick="toggleSyncPanel()" style="background:none;border:none;color:var(--muted);font-size:0.78rem;cursor:pointer;padding:8px 16px;border-radius:8px;">
      ⚙️ Configurações e sincronia
    </button>
  </div>`;

  // Painel de sync (inicialmente oculto)
  html += `
  <div id="syncPanel" style="display:none;">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h2>☁️ Sincronização GitHub</h2>
        <button onclick="document.getElementById('syncPanel').style.display='none'" style="background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;">✕</button>
      </div>
      <div style="margin-bottom:10px;">
        <label style="font-size:0.8rem;color:var(--muted);display:block;margin-bottom:4px;">🔑 Token do GitHub</label>
        <div style="display:flex;gap:6px;">
          <input type="password" id="ghToken" style="flex:1;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);color:var(--text);font-size:0.85rem;" placeholder="github_pat_...">
          <button class="btn btn-primary" onclick="salvarToken()" style="padding:10px 14px;">💾</button>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn btn-secondary" onclick="exportarProgresso()" style="flex:1;padding:8px;">📥 Exportar</button>
        <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()" style="flex:1;padding:8px;">📤 Importar</button>
        <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importarProgresso(event)">
        <button class="btn btn-primary" onclick="syncComGitHub()" style="flex:1;padding:8px;">🔄 Sync</button>
        <button class="btn btn-outline" onclick="syncDoGitHub()" style="flex:1;padding:8px;">⬇️ Baixar</button>
      </div>
      <div style="margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);text-align:center;">
        <button onclick="confirmarZerarProgresso()" style="padding:10px 16px;font-size:0.82rem;background:#ff3b30;color:white;border:none;border-radius:10px;cursor:pointer;font-weight:600;">
          🗑️ Zerar todo o progresso
        </button>
        <div style="font-size:0.7rem;color:var(--muted);margin-top:3px;">Protegido pela senha do site</div>
      </div>
      <div id="syncStatus" style="font-size:0.82rem;color:var(--muted);padding:8px 10px;border-radius:8px;background:rgba(0,0,0,0.2);margin-top:10px;min-height:20px;">
        Pronto.
      </div>
    </div>
  </div>`;

  content.innerHTML = html;
}

// ═══ Sync / Settings ═══
const SYNC_KEY = 'hermesmed_sync';
const LOG_KEY = 'hermesmed_log';
const GH_OWNER = 'enzocampos4';
const GH_REPO = 'mooncake-stash';
const GH_BRANCH = 'main';
const GH_PATH_ESTADO = 'data/progresso/estado.json';

function toggleSyncPanel() {
  const p = document.getElementById('syncPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  if (p.style.display === 'block') {
    const saved = localStorage.getItem(SYNC_KEY);
    if (saved) {
      try {
        const cfg = JSON.parse(saved);
        if (cfg.token) document.getElementById('ghToken').value = cfg.token;
      } catch {}
    }
  }
}

function salvarToken() {
  const t = document.getElementById('ghToken').value.trim();
  if (!t) { setSyncStatus('⚠️ Digite um token', '#ff9f0a'); return; }
  localStorage.setItem(SYNC_KEY, JSON.stringify({ token: t }));
  setSyncStatus('✅ Token salvo! (já fica salvo no navegador, não precisa digitar de novo)', '#34c759');
  document.getElementById('ghToken').placeholder = '🔒 Token salvo';
}

function setSyncStatus(msg, color) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.style.color = color || 'var(--muted)';
}

function getConfig() {
  try { return JSON.parse(localStorage.getItem(SYNC_KEY) || '{}'); }
  catch { return {}; }
}

function exportarProgresso() {
  try {
    const dados = {
      exportado: new Date().toISOString(),
      versao: 2,
      progresso: JSON.parse(localStorage.getItem('hermesmed_progresso') || '{}'),
      log: JSON.parse(localStorage.getItem(LOG_KEY) || '[]'),
      favoritos: JSON.parse(localStorage.getItem('hermesmed_favoritos') || '{}'),
      notas: JSON.parse(localStorage.getItem('hermesmed_notas') || '{}'),
      streak: JSON.parse(localStorage.getItem('hermesmed_streak') || '{}'),
      simulados: JSON.parse(localStorage.getItem('hermesmed_simulados') || '{}')
    };
    const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'hermesmed-progresso-' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
    URL.revokeObjectURL(url);
    setSyncStatus('✅ Exportado!', '#34c759');
  } catch(e) { setSyncStatus('❌ Erro: ' + e.message, '#ff3b30'); }
}

function importarProgresso(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const d = JSON.parse(e.target.result);
      if (d.progresso) localStorage.setItem('hermesmed_progresso', JSON.stringify(d.progresso));
      if (d.log) localStorage.setItem(LOG_KEY, JSON.stringify(d.log));
      if (d.favoritos) localStorage.setItem('hermesmed_favoritos', JSON.stringify(d.favoritos));
      if (d.notas) localStorage.setItem('hermesmed_notas', JSON.stringify(d.notas));
      if (d.streak) localStorage.setItem('hermesmed_streak', JSON.stringify(d.streak));
      if (d.simulados) localStorage.setItem('hermesmed_simulados', JSON.stringify(d.simulados));
      setSyncStatus('✅ Importado! Recarregando...', '#34c759');
      setTimeout(() => location.reload(), 1000);
    } catch(err) { setSyncStatus('❌ Erro: ' + err.message, '#ff3b30'); }
  };
  reader.readAsText(file);
}

async function syncComGitHub() {
  const cfg = getConfig();
  if (!cfg.token) { setSyncStatus('⚠️ Configure o token!', '#ff9f0a'); return; }
  setSyncStatus('🔄 Enviando...', '#5ac8fa');
  try {
    const dados = {
      exportado: new Date().toISOString(),
      versao: 2,
      progresso: JSON.parse(localStorage.getItem('hermesmed_progresso') || '{}'),
      log: JSON.parse(localStorage.getItem(LOG_KEY) || '[]'),
      favoritos: JSON.parse(localStorage.getItem('hermesmed_favoritos') || '{}'),
      notas: JSON.parse(localStorage.getItem('hermesmed_notas') || '{}'),
      streak: JSON.parse(localStorage.getItem('hermesmed_streak') || '{}'),
      simulados: JSON.parse(localStorage.getItem('hermesmed_simulados') || '{}')
    };
    const conteudo = btoa(unescape(encodeURIComponent(JSON.stringify(dados, null, 2))));
    let sha = null;
    try {
      const r = await fetch('https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + GH_PATH_ESTADO + '?ref=' + GH_BRANCH, {
        headers: { 'Authorization': 'Bearer ' + cfg.token }
      });
      if (r.ok) { const d = await r.json(); sha = d.sha; }
    } catch {}
    const body = { message: '📊 Sync desempenho - ' + new Date().toISOString().split('T')[0], content: conteudo, branch: GH_BRANCH };
    if (sha) body.sha = sha;
    const resp = await fetch('https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + GH_PATH_ESTADO, {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + cfg.token, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!resp.ok) { const err = await resp.json(); throw new Error(err.message); }
    setSyncStatus('✅ Sincronizado!', '#34c759');
  } catch(e) { setSyncStatus('❌ ' + e.message, '#ff3b30'); }
}

async function syncDoGitHub() {
  setSyncStatus('⬇️ Baixando...', '#5ac8fa');
  try {
    const resp = await fetch('https://raw.githubusercontent.com/' + GH_OWNER + '/' + GH_REPO + '/' + GH_BRANCH + '/' + GH_PATH_ESTADO);
    if (!resp.ok) throw new Error('Nada na nuvem');
    const d = await resp.json();
    if (d.progresso) localStorage.setItem('hermesmed_progresso', JSON.stringify(d.progresso));
    if (d.log) localStorage.setItem(LOG_KEY, JSON.stringify(d.log));
    if (d.favoritos) localStorage.setItem('hermesmed_favoritos', JSON.stringify(d.favoritos));
    if (d.notas) localStorage.setItem('hermesmed_notas', JSON.stringify(d.notas));
    if (d.streak) localStorage.setItem('hermesmed_streak', JSON.stringify(d.streak));
    if (d.simulados) localStorage.setItem('hermesmed_simulados', JSON.stringify(d.simulados));
    setSyncStatus('✅ Restaurado! Recarregando...', '#34c759');
    setTimeout(() => location.reload(), 1000);
  } catch(e) { setSyncStatus('⚠️ ' + e.message, '#ff9f0a'); }
}

// ─── Zerar progresso (protegido por senha) ───
const HASH_SENHA = '7bbe53946a9673db28527380a7aafba86eaba6f7f6db8ccd6989c7b0b45cff7c';

async function hashSenha(senha) {
  const encoder = new TextEncoder();
  const data = encoder.encode(senha);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}

async function confirmarZerarProgresso() {
  const senha = prompt('🔐 Digite sua senha para zerar todo o progresso:');
  if (!senha) return;
  if ((await hashSenha(senha)) !== HASH_SENHA) { alert('❌ Senha incorreta!'); return; }
  if (!confirm('🗑️ Tem CERTEZA? Vai apagar TODO o progresso do navegador.\n\nO backup no GitHub NÃO será afetado.')) return;
  const c2 = prompt('⚠️ Digite "ZERAR" para confirmar:');
  if (c2 !== 'ZERAR') { alert('Cancelado.'); return; }
  ['hermesmed_progresso','hermesmed_log','hermesmed_favoritos','hermesmed_notas','hermesmed_streak','hermesmed_simulados','hermesmed_auth'].forEach(k => localStorage.removeItem(k));
  alert('✅ Zerado! Recarregando...');
  location.reload();
}
