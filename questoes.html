<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HermesMed — Questões</title>
<script src="auth.js"></script>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --card2: #22223a;
    --accent: #7c5cfc;
    --accent2: #5ac8fa;
    --correct: #34c759;
    --wrong: #ff3b30;
    --text: #e8e8f0;
    --muted: #8888a0;
    --radius: 16px;
    --shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }
  .container { max-width: 750px; margin: 0 auto; }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .topbar .back {
    font-size: 1.3rem;
    text-decoration: none;
    color: var(--text);
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px;
    background: var(--card);
    transition: 0.2s;
  }
  .topbar .back:hover { background: var(--card2); }
  .topbar .info { flex: 1; }
  .topbar .info .title { font-weight: 600; font-size: 0.95rem; }
  .topbar .info .sub { color: var(--muted); font-size: 0.8rem; }
  .topbar .mode-badge {
    background: var(--accent);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    padding: 12px 16px;
    background: var(--card);
    border-radius: 12px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    flex-wrap: wrap;
  }
  .stats-bar .stat { display: flex; align-items: center; gap: 4px; color: var(--muted); }
  .stats-bar .stat strong { color: var(--text); }

  /* Question card */
  .question-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px 20px;
    margin-bottom: 16px;
  }
  .question-card .meta {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .question-card .meta .tag {
    background: var(--card2);
    padding: 2px 8px;
    border-radius: 6px;
  }
  .question-card .meta .tag.area-tag { background: rgba(124,92,252,0.15); color: var(--accent); }
  .question-card .enunciado {
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .question-card .enunciado strong { color: var(--accent2); }
  .question-card .enunciado .highlight {
    background: rgba(255,255,255,0.06);
    padding: 12px 16px;
    border-radius: 10px;
    display: block;
    margin: 12px 0;
    border-left: 3px solid var(--accent2);
    font-style: italic;
  }

  /* Alternativas */
  .alternativas { display: flex; flex-direction: column; gap: 8px; }
  .alt-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card2);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    color: var(--text);
    font-size: 0.95rem;
    text-align: left;
    width: 100%;
  }
  .alt-btn:hover:not(.disabled) {
    border-color: var(--accent);
    background: rgba(124,92,252,0.08);
  }
  .alt-btn .letter {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 0.8rem;
    flex-shrink: 0;
    transition: 0.2s;
  }
  .alt-btn .text { flex: 1; line-height: 1.4; }
  .alt-btn.selected { border-color: var(--accent); }
  .alt-btn.selected .letter { background: var(--accent); color: white; }
  .alt-btn.correct {
    border-color: var(--correct);
    background: rgba(52,199,89,0.1);
  }
  .alt-btn.correct .letter { background: var(--correct); color: white; }
  .alt-btn.wrong {
    border-color: var(--wrong);
    background: rgba(255,59,48,0.1);
  }
  .alt-btn.wrong .letter { background: var(--wrong); color: white; }
  .alt-btn.disabled { cursor: default; opacity: 0.85; }
  .alt-btn.show-correct {
    border-color: var(--correct);
    background: rgba(52,199,89,0.08);
  }
  .alt-btn.show-correct .letter { background: var(--correct); color: white; }

  /* Explicação */
  .explicacao {
    margin-top: 16px;
    padding: 16px;
    background: rgba(124,92,252,0.06);
    border-radius: 12px;
    border-left: 3px solid var(--accent);
    display: none;
  }
  .explicacao.visible { display: block; }
  .explicacao strong { color: var(--accent2); display: block; margin-bottom: 6px; font-size: 0.85rem; }
  .explicacao p { line-height: 1.6; font-size: 0.9rem; color: #ccc; }
  .enunciado-imgs { margin-bottom: 16px; }
  .enunciado-imgs img {
    max-width: 100%; border-radius: 12px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.06); display: block;
  }
  .enunciado-imgs img:hover { opacity: 0.9; }
  .explicacao .exp-images { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
  .explicacao .exp-images img {
    max-width: 100%; border-radius: 12px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.06);
    transition: 0.2s;
  }
  .explicacao .exp-images img:hover { opacity: 0.9; transform: scale(1.01); }

  /* Action buttons */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .btn {
    flex: 1;
    min-width: 100px;
    padding: 12px 16px;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    text-align: center;
    color: white;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); }
  .btn-primary:hover { background: #6a4ae0; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: var(--card2); color: var(--text); }
  .btn-secondary:hover { background: #2a2a44; }
  .btn-correct { background: var(--correct); }
  .btn-correct:hover { background: #2db84e; }
  .btn-wrong { background: var(--wrong); }
  .btn-wrong:hover { background: #d6302a; }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--card2);
    color: var(--muted);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--text); }

  /* Progress dots */
  .progress-dots {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    padding: 12px;
    background: var(--card);
    border-radius: 12px;
    justify-content: center;
  }
  .dot {
    width: 24px; height: 24px;
    border-radius: 6px;
    background: var(--card2);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: 0.2s;
  }
  .dot.current { background: var(--accent); color: white; }
  .dot.correct { background: var(--correct); color: white; }
  .dot.wrong { background: var(--wrong); color: white; }
  .dot:hover { transform: scale(1.1); }

  /* Result screen */
  .result-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }
  .result-screen.visible { display: block; }
  .result-screen .big-icon { font-size: 4rem; margin-bottom: 16px; }
  .result-screen h2 { font-size: 1.5rem; margin-bottom: 8px; }
  .result-screen p { color: var(--muted); margin-bottom: 8px; }
  .result-screen .score {
    font-size: 3rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .result-screen .details {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin: 20px 0;
    flex-wrap: wrap;
  }
  .result-screen .details .item {
    background: var(--card);
    padding: 16px 20px;
    border-radius: 12px;
    min-width: 100px;
  }
  .result-screen .details .item .num { font-size: 1.5rem; font-weight: 700; }
  .result-screen .details .item .label { font-size: 0.8rem; color: var(--muted); }

  /* Animação */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .question-card { animation: fadeInUp 0.3s ease; }

  /* Esconder questões na tela de resultado */
  .hide-when-result { display: block; }
  .result-screen.visible ~ .hide-when-result { display: none; }

  /* Subject grid */
  .area-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .area-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 16px;
    cursor: pointer;
    transition: 0.25s;
    border: 1px solid transparent;
  }
  .area-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
  .area-card .area-icon { font-size: 1.8rem; margin-bottom: 6px; }
  .area-card .area-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
  .area-card .area-count { font-size: 0.8rem; color: var(--muted); }
  .area-progress {
    display: flex; align-items: center; gap: 8px; margin: 6px 0 8px;
  }
  .area-prog-bar {
    flex: 1; height: 5px; background: var(--card2); border-radius: 3px; overflow: hidden;
  }
  .area-prog-fill {
    height: 100%; border-radius: 3px; transition: width 0.6s ease;
  }
  .area-prog-text {
    font-size: 0.68rem; color: var(--muted); white-space: nowrap; min-width: 55px; text-align: right;
  }
  .area-card .area-subs { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .area-card .area-subs span {
    font-size: 0.65rem; background: var(--card2); padding: 2px 6px;
    border-radius: 4px; color: var(--muted);
  }

  /* Subcategory filter pills */
  .sub-filter {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .sub-pill {
    font-size: 0.75rem; padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--card2); background: var(--card);
    color: var(--muted); cursor: pointer; transition: 0.2s;
  }
  .sub-pill:hover { border-color: var(--accent); color: var(--text); }
  .sub-pill.active { background: var(--accent); color: white; border-color: var(--accent); }
  .sub-pill .count { opacity: 0.7; margin-left: 3px; }

  /* Sub-subcategory filter pills (drill-down) */
  .sub-filter-2 {
    margin-left: 8px; margin-top: -8px; margin-bottom: 14px;
    padding-left: 12px; border-left: 2px solid var(--accent2);
  }
  .sub-filter-2 .sub-pill {
    font-size: 0.7rem; padding: 3px 10px;
    border-color: var(--accent2);
    opacity: 0.85;
  }
  .sub-filter-2 .sub-pill:hover { opacity: 1; }
  .sub-filter-2 .sub-pill.active { background: var(--accent2); border-color: var(--accent2); color: #0f0f1a; }
  .sub-filter-2 .sub-pill .count { font-size: 0.65rem; }

  /* Tag favorito */
  .tag-fav { background: rgba(255,215,0,0.15) !important; color: #ffd700 !important; cursor: pointer; transition: 0.2s; }
  .tag-fav:hover { transform: scale(1.15); }
  .btn-fav { background: #ffd700; color: #1a1a2e; }
  .btn-fav:hover { background: #ffed4a; }
  .dot.fav { background: rgba(255,215,0,0.3); color: #ffd700; border: 1px solid #ffd700; }
  .dot.fav.current { background: #ffd700; color: #1a1a2e; }

  /* Filter mode pills */
  .filter-mode {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
  }
  .mode-pill {
    font-size: 0.72rem; padding: 4px 12px; border-radius: 20px;
    border: 1px solid var(--card2); background: var(--card);
    color: var(--muted); cursor: pointer; transition: 0.2s;
  }
  .mode-pill:hover { border-color: var(--accent); color: var(--text); }
  .mode-pill.active { background: var(--accent); color: white; border-color: var(--accent); }
  .mode-pill .count { opacity: 0.7; margin-left: 3px; }

  /* Shuffle button */
  .shuffle-btn {
    font-size: 0.72rem; padding: 4px 10px; border-radius: 20px;
    border: 1px solid var(--card2); background: var(--card);
    color: var(--muted); cursor: pointer; transition: 0.2s; margin-left: auto;
  }
  .shuffle-btn:hover, .shuffle-btn.active { border-color: var(--accent); color: var(--accent2); }
  .shuffle-btn.active { background: rgba(90,200,250,0.1); }

  /* Lista modal */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); z-index: 999; padding: 20px;
    overflow-y: auto; animation: fadeIn 0.2s;
  }
  .modal-overlay.visible { display: flex; align-items: flex-start; justify-content: center; }
  .modal-content {
    background: var(--card); border-radius: var(--radius); max-width: 700px;
    width: 100%; max-height: 85vh; overflow-y: auto; padding: 20px;
    box-shadow: var(--shadow); animation: fadeInUp 0.25s;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .modal-header h3 { font-size: 1rem; font-weight: 600; }
  .modal-close {
    width: 32px; height: 32px; border-radius: 8px; background: var(--card2);
    border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { color: var(--text); }
  .modal-search {
    width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--card2);
    background: var(--card2); color: var(--text); font-size: 0.85rem; margin-bottom: 12px;
    outline: none;
  }
  .modal-search:focus { border-color: var(--accent); }
  .modal-filter-row {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
  }
  .modal-filter-chip {
    font-size: 0.7rem; padding: 3px 10px; border-radius: 14px;
    border: 1px solid var(--card2); background: var(--card2);
    color: var(--muted); cursor: pointer; transition: 0.2s;
  }
  .modal-filter-chip:hover { border-color: var(--accent); color: var(--text); }
  .modal-filter-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

  .lista-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    transition: 0.15s; border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .lista-item:hover { background: var(--card2); }
  .lista-item .li-num {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.7rem; flex-shrink: 0;
    background: var(--card2); color: var(--muted);
  }
  .lista-item .li-status {
    width: 20px; text-align: center; flex-shrink: 0; font-size: 0.85rem;
  }
  .lista-item .li-info { flex: 1; min-width: 0; }
  .lista-item .li-info .li-enun {
    font-size: 0.8rem; color: var(--text); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; line-height: 1.3;
  }
  .lista-item .li-info .li-meta {
    font-size: 0.68rem; color: var(--muted); margin-top: 2px;
  }
  .lista-item .li-info .li-meta span { margin-right: 8px; }
  .lista-item .li-diff {
    font-size: 0.65rem; padding: 2px 6px; border-radius: 4px;
    background: var(--bg); color: var(--muted); flex-shrink: 0;
  }
  .lista-item .li-fav { font-size: 0.8rem; flex-shrink: 0; }
  .li-empty {
    text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.9rem;
  }

  /* Anotações */
  .notas-area {
    margin-top: 16px; display: none;
  }
  .notas-area.visible { display: block; }
  .notas-area textarea {
    width: 100%; min-height: 60px; padding: 10px 12px; border-radius: 10px;
    border: 1px solid var(--card2); background: var(--card2); color: var(--text);
    font-size: 0.82rem; font-family: inherit; resize: vertical; outline: none;
    line-height: 1.5;
  }
  .notas-area textarea:focus { border-color: var(--accent); }
  .notas-area .nota-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 4px; font-size: 0.7rem; color: var(--muted);
  }
  .nota-salvar {
    font-size: 0.7rem; padding: 3px 10px; border-radius: 6px;
    border: none; background: var(--accent); color: white; cursor: pointer;
  }
  .nota-salvar:hover { background: #6a4ae0; }
  .nota-salvar:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Streak bar */
  .streak-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; background: var(--card); border-radius: 10px;
    margin-bottom: 12px; font-size: 0.78rem;
  }
  .streak-bar .streak-fire { font-size: 1.1rem; }
  .streak-bar .streak-info { flex: 1; }
  .streak-bar .streak-info strong { color: #ff9f0a; }
  .streak-bar .streak-prog {
    flex: 1; height: 6px; background: var(--card2); border-radius: 3px;
    overflow: hidden; max-width: 120px;
  }
  .streak-bar .streak-prog .fill {
    height: 100%; background: linear-gradient(90deg, #ff9f0a, #ffd700);
    border-radius: 3px; transition: width 0.5s;
  }

  @media (max-width: 500px) {
    .area-grid { grid-template-columns: 1fr; }
    body { padding: 10px; }
    .question-card { padding: 16px 14px; }
    .question-card .enunciado { font-size: 0.92rem; }
    .alt-btn { padding: 12px; font-size: 0.88rem; }
    .topbar .info .title { font-size: 0.85rem; }
  }
</style>
</head>
<body>
<div class="container">
  <!-- Top bar -->
  <div class="topbar">
    <a href="index.html" class="back" id="backBtn" onclick="if(document.getElementById('questionView').style.display!='none'){event.preventDefault();voltarGrade()}">←</a>
    <div class="info">
      <div class="title" id="pageTitle">Questões</div>
      <div class="sub" id="pageSub">Carregando...</div>
    </div>
    <span class="mode-badge" id="modeBadge">Livre</span>
  </div>

  <!-- Area grid (default view) -->
  <div id="areaGrid" class="area-grid"></div>

  <!-- Question view (hidden by default) -->
  <div id="questionView" style="display:none;">
    <!-- Streak -->
    <div class="streak-bar" id="streakBar" style="display:none;">
      <span class="streak-fire" id="streakIcon">🔥</span>
      <span class="streak-info"><strong id="streakCount">0</strong> dias seguidos</span>
      <span class="streak-prog"><div class="fill" id="streakFill" style="width:0%"></div></span>
    </div>

    <!-- Subcategory filter -->
    <div class="sub-filter" id="subFilter"></div>
    <!-- Sub-subcategory drill-down -->
    <div class="sub-filter sub-filter-2" id="subFilter2" style="display:none;"></div>

    <!-- Filter mode + Shuffle + Lista -->
    <div class="filter-mode" id="filterMode" style="display:none;">
      <span class="mode-pill active" data-mode="todas" onclick="filtrarEstado('todas')">Todas</span>
      <span class="mode-pill" data-mode="nao" onclick="filtrarEstado('nao')">⬜ Não respondidas</span>
      <span class="mode-pill" data-mode="errou" onclick="filtrarEstado('errou')">❌ Erradas</span>
      <span class="mode-pill" data-mode="acertou" onclick="filtrarEstado('acertou')">✅ Acertadas</span>
      <span class="mode-pill" data-mode="favoritas" onclick="filtrarEstado('favoritas')">⭐ Favoritas</span>
      <span class="shuffle-btn" id="shuffleBtn" onclick="toggleShuffle()">🔀</span>
      <span class="shuffle-btn" onclick="abrirLista()">📋</span>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar">
      <span class="stat">📝 <strong id="qIndex">1</strong>/<span id="qTotal">0</span></span>
      <span class="stat">✅ <strong id="qAcertos">0</strong></span>
      <span class="stat">❌ <strong id="qErros">0</strong></span>
      <span class="stat" id="timerStat">⏱️ <strong id="qTimer">00:00</strong></span>
    </div>

    <!-- Progress dots -->
    <div class="progress-dots" id="progressDots"></div>
    <div style="text-align:center;margin-bottom:12px;" id="backToAreasLink">
      <a href="#" onclick="voltarGrade();return false" style="color:var(--muted);font-size:0.8rem;text-decoration:none;">← Voltar para áreas</a>
    </div>

    <!-- Question area -->
    <div id="questionArea">
    <div class="question-card" id="questionCard">
      <div class="meta">
        <span class="tag area-tag" id="qArea"></span>
        <span class="tag" id="qEspecialidade"></span>
        <span class="tag" id="qFonte"></span>
        <span class="tag" id="qDificuldade"></span>
        <span class="tag tag-fav" id="qFavStar" onclick="toggleFavFromMeta()" style="cursor:pointer;user-select:none;">☆</span>
      </div>
      <div class="enunciado" id="qEnunciado"></div>
      <div class="enunciado-imgs" id="qImagens"></div>
      <div class="alternativas" id="qAlternativas"></div>
      <div class="explicacao" id="qExplicacao">
        <strong>📖 Explicação</strong>
        <div id="qExplicacaoTexto"></div>
        <div id="qExpImagens" class="exp-images"></div>
      </div>

      <!-- Anotações -->
      <div class="notas-area" id="notasArea">
        <textarea id="notasText" placeholder="Suas anotações pessoais sobre esta questão..." maxlength="2000"></textarea>
        <div class="nota-footer">
          <span id="notasStatus"></span>
          <button class="nota-salvar" id="notasSalvar" onclick="salvarNotaAtual()">💾</button>
        </div>
      </div>

      <div class="actions" id="qActions">
        <button class="btn btn-secondary" id="btnPrev" onclick="previousQuestion()" style="display:none;">← Anterior</button>
        <button class="btn btn-primary" id="btnConfirm" onclick="confirmAnswer()">Confirmar</button>
        <button class="btn btn-secondary" id="btnSkip" onclick="pularQuestao()" style="display:none;">⏭️ Pular</button>
        <button class="btn btn-secondary" id="btnNext" onclick="nextQuestion()">Próxima →</button>
      </div>
    </div> <!-- /question-card -->
  </div> <!-- /questionArea -->
</div> <!-- /questionView -->

  <!-- Result screen -->
  <div class="result-screen" id="resultScreen">
    <div class="big-icon" id="resultIcon">🎉</div>
    <h2 id="resultTitle">Simulado Concluído!</h2>
    <div class="score" id="resultScore">0%</div>
    <p id="resultText">Você acertou 0 de 0 questões</p>
    <div class="details">
      <div class="item"><div class="num" id="rAcertos">0</div><div class="label">Acertos</div></div>
      <div class="item"><div class="num" id="rErros">0</div><div class="label">Erros</div></div>
      <div class="item"><div class="num" id="rAproveitamento">0%</div><div class="label">Aproveitamento</div></div>
    </div>
    <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:20px;">
      <a href="#" onclick="voltarGrade();return false" class="btn btn-secondary" style="flex:0;padding:12px 24px;">← Áreas</a>
      <button class="btn btn-primary" onclick="refazerArea()" style="flex:0;padding:12px 24px;">🔄 Refazer</button>
    </div>
  </div>

  <!-- Lista Modal -->
  <div class="modal-overlay" id="listaModal" onclick="if(event.target===this)fecharLista()">
    <div class="modal-content">
      <div class="modal-header">
        <h3>📋 Questões <span id="listaCount" style="font-weight:400;color:var(--muted)"></span></h3>
        <button class="modal-close" onclick="fecharLista()">✕</button>
      </div>
      <input class="modal-search" id="listaSearch" placeholder="🔍 Buscar no enunciado..." oninput="renderizarLista()">
      <div class="modal-filter-row" id="listaFilterRow">
        <span class="modal-filter-chip active" data-f="todas" onclick="filtroLista('todas')">Todas</span>
        <span class="modal-filter-chip" data-f="acertou" onclick="filtroLista('acertou')">✅</span>
        <span class="modal-filter-chip" data-f="errou" onclick="filtroLista('errou')">❌</span>
        <span class="modal-filter-chip" data-f="nao" onclick="filtroLista('nao')">⬜</span>
        <span class="modal-filter-chip" data-f="favoritas" onclick="filtroLista('favoritas')">⭐</span>
      </div>
      <div id="listaBody"></div>
    </div>
  </div>
</div>

<script>
// ─── State ───
const STORAGE_KEY = 'hermesmed_progresso';
const REVISAO_KEY = 'hermesmed_revisao';
const FAVORITOS_KEY = 'hermesmed_favoritos';
const NOTAS_KEY = 'hermesmed_notas';
const STREAK_KEY = 'hermesmed_streak';
const ASSUNTOS_URL = 'data/assuntos.json';

let questoes = [];
let currentIndex = 0;
let acertos = 0;
let erros = 0;
let timerInterval = null;
let timerSeconds = 0;
let answered = false;
let modo = 'livre';
let areaAtual = null;
let subareaFiltro = null;
let subSubareaFiltro = null; // sub-subcategoria (drill-down)
let questoesFiltradas = [];
let assuntoData = null;
let filtroEstado = 'todas'; // 'todas' | 'acertou' | 'errou' | 'nao' | 'favoritas'
let ordemEmbaralhada = false;

const AREA_ICONS = {
  'clinica-medica': '🫁', 'cirurgia': '🔪', 'pediatria': '👶',
  'ginecologia': '🩺', 'obstetricia': '🤰', 'medicina-preventiva': '🛡️',
  'oftalmologia': '👁️', 'ortopedia': '🦴', 'otorrino': '👂', 'psiquiatria': '🧠'
};
const AREA_COLORS = {
  'clinica-medica': '#7c5cfc', 'cirurgia': '#ff6b6b', 'pediatria': '#5ac8fa',
  'ginecologia': '#ff8a80', 'obstetricia': '#ff6f91', 'medicina-preventiva': '#34c759',
  'oftalmologia': '#30d158', 'ortopedia': '#af52de', 'otorrino': '#64d2ff', 'psiquiatria': '#bf5af2'
};

// ─── Storage helpers ───
function getAreaKey(q) {
  return areaAtual || q?.area?.toLowerCase().replace(/[^a-z0-9]/g, '-') || 'geral';
}

function getProgQuestao(qId, areaKey) {
  const p = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  const area = p[areaKey] || {};
  const val = area[String(qId)];
  if (val === true || val === false) {
    return { acertou: val, selecao: null, favorita: false, nota: '', respondida: true };
  }
  return val || { acertou: null, selecao: null, favorita: false, nota: '', respondida: false };
}

function setProgQuestao(qId, areaKey, data) {
  const p = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  if (!p[areaKey]) p[areaKey] = {};
  const curr = p[areaKey][String(qId)];
  if (curr === true || curr === false) {
    p[areaKey][String(qId)] = { acertou: curr, selecao: null, favorita: false, nota: '', respondida: true };
  }
  const novo = p[areaKey][String(qId)] || { acertou: null, selecao: null, favorita: false, nota: '', respondida: false };
  Object.assign(novo, data);
  novo.respondida = novo.acertou !== null;
  p[areaKey][String(qId)] = novo;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
  return novo;
}

function delProgQuestao(qId, areaKey) {
  const p = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  if (p[areaKey]) {
    delete p[areaKey][String(qId)];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
  }
}

function getFavoritos() {
  return JSON.parse(localStorage.getItem(FAVORITOS_KEY) || '{}');
}

function setFavorito(qId, val) {
  const f = getFavoritos();
  if (val) f[String(qId)] = true;
  else delete f[String(qId)];
  localStorage.setItem(FAVORITOS_KEY, JSON.stringify(f));
}

function isFavorito(qId) {
  return !!getFavoritos()[String(qId)];
}

function toggleFavorito(qId) {
  const nova = !isFavorito(qId);
  setFavorito(qId, nova);
  return nova;
}

function getNota(qId) {
  const n = JSON.parse(localStorage.getItem(NOTAS_KEY) || '{}');
  return n[String(qId)] || '';
}

function setNota(qId, texto) {
  const n = JSON.parse(localStorage.getItem(NOTAS_KEY) || '{}');
  if (texto.trim()) n[String(qId)] = texto.trim();
  else delete n[String(qId)];
  localStorage.setItem(NOTAS_KEY, JSON.stringify(n));
}

// ─── Init ───
const params = new URLSearchParams(window.location.search);
modo = params.get('modo') || 'livre';
const areaParam = params.get('area') || null;

document.getElementById('modeBadge').textContent =
  modo === 'prova' ? 'Prova' : modo === 'revisao' ? 'Revisão' : 'Livre';

async function init() {
  // Always load assuntoData first (needed by both modes)
  try {
    const r = await fetch(ASSUNTOS_URL);
    assuntoData = await r.json();
  } catch {
    assuntoData = {};
  }

  if (modo === 'revisao') {
    await carregarRevisao();
  } else if (areaParam && assuntoData[areaParam]) {
    document.getElementById('areaGrid').style.display = 'none';
    await abrirArea(areaParam);
  } else {
    await mostrarGrade();
  }
}

// ─── Grade de Áreas ───
async function mostrarGrade() {
  try {
    const r = await fetch(ASSUNTOS_URL);
    assuntoData = await r.json();
  } catch {
    document.getElementById('pageSub').textContent = 'Erro ao carregar assuntos';
    return;
  }

  document.getElementById('pageTitle').textContent = 'Estude por Assunto';
  document.getElementById('pageSub').textContent =
    `${Object.keys(assuntoData).length} áreas • ${Object.values(assuntoData).reduce((s, a) => s + a.total, 0)} questões`;

  const grid = document.getElementById('areaGrid');
  grid.innerHTML = '';

  const progresso = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

  for (const [slug, info] of Object.entries(assuntoData)) {
    const subs = Object.values(info.subcategorias || {});
    let subsHtml = subs.slice(0, 4).map(s => `<span>${s.nome}</span>`).join('');
    if (subs.length > 4) subsHtml += `<span>+${subs.length - 4}</span>`;

    // Stats
    let progArea = {};
    if (slug === 'ginecologia' || slug === 'obstetricia') {
      progArea = { ...(progresso['ginecologia'] || {}), ...(progresso['obstetricia'] || {}) };
    } else {
      progArea = progresso[slug] || {};
    }
    const vals = Object.values(progArea);
    let acertosArea = 0, totalResp = 0;
    vals.forEach(v => {
      const acertou = typeof v === 'boolean' ? v : v?.acertou;
      if (acertou !== null && acertou !== undefined) {
        totalResp++;
        if (acertou) acertosArea++;
      }
    });
    const pct = totalResp > 0 ? Math.round((acertosArea / totalResp) * 100) : null;
    const total = info.total;

    const card = document.createElement('div');
    card.className = 'area-card';
    card.innerHTML = `
      <div class="area-icon">${AREA_ICONS[slug] || '📚'}</div>
      <div class="area-name" style="color:${AREA_COLORS[slug] || 'var(--text)'}">${info.nome}</div>
      <div class="area-count">${total} questões</div>
      <div class="area-progress">
        <div class="area-prog-bar">
          <div class="area-prog-fill" style="width:${pct !== null ? pct : 0}%;background:${pct !== null ? (pct >= 70 ? '#34c759' : pct >= 40 ? '#ff9f0a' : '#ff453a') : 'transparent'}"></div>
        </div>
        <span class="area-prog-text">${pct !== null ? `${pct}% (${acertosArea}/${totalResp})` : '—'}</span>
      </div>
      <div class="area-subs">${subsHtml}</div>
    `;
    card.onclick = () => abrirArea(slug);
    grid.appendChild(card);
  }

  document.getElementById('areaGrid').style.display = 'grid';
  document.getElementById('questionView').style.display = 'none';
}

// ─── Abrir Área ───
const AREA_NAMES = {
  'clinica-medica': 'Clínica Médica', 'cirurgia': 'Cirurgia',
  'pediatria': 'Pediatria', 'ginecologia': 'Ginecologia e Obstetrícia',
  'obstetricia': 'Obstetrícia', 'medicina-preventiva': 'Medicina Preventiva'
};

async function abrirArea(slug) {
  areaAtual = slug;
  subareaFiltro = null;
  document.getElementById('areaGrid').style.display = 'none';

  try {
    const r = await fetch(`data/${slug}.json`);
    const data = await r.json();
    questoes = data.questoes || [];
  } catch {
    questoes = [];
  }

  if (questoes.length === 0) {
    document.getElementById('pageSub').textContent = 'Nenhuma questão disponível';
    return;
  }

  questoesFiltradas = [...questoes];
  document.getElementById('pageTitle').textContent = AREA_NAMES[slug] || slug.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  document.getElementById('pageSub').textContent = `${questoes.length} questões`;
  document.getElementById('modeBadge').textContent = '📖 Livre';

  // Subarea filter
  const subs = Object.entries(assuntoData?.[slug]?.subcategorias || {});
  const filterEl = document.getElementById('subFilter');
  const filter2El = document.getElementById('subFilter2');
  filter2El.style.display = 'none';
  filter2El.innerHTML = '';
  const progresso = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  const areaKey = slug;
  const progArea = progresso[areaKey] || {};

  if (subs.length > 0) {
    filterEl.innerHTML = `<span class="sub-pill active" data-sub="" onclick="filtrarSubarea('')">Todas <span class="count">(${questoes.length})</span></span>` +
      subs.map(([subSlug, subInfo]) => {
        // Stats for subarea
        const subNome = subInfo.nome;
        const qsSub = questoes.filter(q => q.subarea && q.subarea.toLowerCase() === subNome.toLowerCase());
        let acertouCnt = 0, totalCnt = 0;
        qsSub.forEach(q => {
          const v = progArea[String(q.id)];
          const ac = typeof v === 'boolean' ? v : v?.acertou;
          if (ac !== undefined && ac !== null) { totalCnt++; if (ac) acertouCnt++; }
        });
        const statsStr = totalCnt > 0 ? ` ✅${acertouCnt}` : '';
        return `<span class="sub-pill" data-sub="${subSlug}" onclick="filtrarSubarea('${subSlug}')">${subInfo.nome} <span class="count">(${subInfo.total}${statsStr})</span></span>`;
      }).join('');
  } else {
    filterEl.innerHTML = '';
  }

  // Show question view
  document.getElementById('questionView').style.display = 'block';

  // Show filter mode + streak
  document.getElementById('filterMode').style.display = 'flex';
  document.getElementById('streakBar').style.display = '';
  atualizarStreak();

  // Init question state
  questoesFiltradas = [...questoes];
  currentIndex = 0;
  acertos = 0;
  erros = 0;
  answered = false;
  filtroEstado = 'todas';
  document.querySelectorAll('#filterMode .mode-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.mode === 'todas');
  });
  document.getElementById('shuffleBtn').classList.remove('active');
  ordemEmbaralhada = false;
  document.getElementById('qTotal').textContent = questoesFiltradas.length;
  renderDots();
  showQuestion(0);
}

// ─── Filter by subarea ───
function _lookupSubNome(subSlug) {
  const found = assuntoData?.[areaAtual]?.subcategorias?.[subSlug]?.nome;
  return found || '';
}

function filtrarSubarea(subSlug) {
  subareaFiltro = subSlug || null;
  subSubareaFiltro = null; // reset sub-subcategory filter
  document.querySelectorAll('#subFilter .sub-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.sub === (subSlug || ''));
  });

  // Show/hide sub-subcategory drill-down
  const filter2El = document.getElementById('subFilter2');
  if (subSlug && assuntoData?.[areaAtual]?.subdetalhes?.[subSlug]) {
    const detalhes = assuntoData[areaAtual].subdetalhes[subSlug];
    const subcats = detalhes.subcategorias || [];
    if (subcats.length > 0) {
      // Count questions per sub-subcategory
      const subNome = _lookupSubNome(subSlug);
      const qs = subNome ? questoes.filter(q => q.subarea && q.subarea.toLowerCase() === subNome.toLowerCase()) : questoes;
      const subSubCounts = {};
      qs.forEach(q => {
        if (q.sub_subarea) {
          subSubCounts[q.sub_subarea] = (subSubCounts[q.sub_subarea] || 0) + 1;
        }
      });

      filter2El.innerHTML =
        `<span class="sub-pill active" data-subsub="" onclick="filtrarSubSubarea('')">Todos <span class="count">(${qs.length})</span></span>` +
        subcats.map(sc => {
          const cnt = subSubCounts[sc] || 0;
          return `<span class="sub-pill" data-subsub="${sc}" onclick="filtrarSubSubarea('${sc.replace(/'/g, "\\'")}')">${sc} <span class="count">(${cnt})</span></span>`;
        }).join('');
      filter2El.style.display = 'flex';
    } else {
      filter2El.style.display = 'none';
    }
  } else {
    filter2El.style.display = 'none';
  }

  aplicarFiltros();
}

function filtrarSubSubarea(subSubNome) {
  subSubareaFiltro = subSubNome || null;
  document.querySelectorAll('#subFilter2 .sub-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.subsub === (subSubNome || ''));
  });
  aplicarFiltros();
}

// ─── Detecta se o enunciado referencia uma imagem que deve ser exibida ───
function temImagemNoEnunciado(enunciado) {
  // Exam/Image name + "a seguir"/"abaixo"/"acima"/"conforme"
  var pat = /(ECG|eletrocardiograma|raio[\s-]?[Xx]|radiografia|tomografia|ultrassonografia|ultrassom|ressonância|angiografia|esfregaço|eletroencefalograma|imagem|figura|gráfic[oa]|fotografia)[^.]{0,60}?(a seguir|abaixo|acima|conforme|como observado)/i;
  var pat2 = /(imagem|figura)\s.*(abaixo|a seguir|acima|demonstra|mostra|apresenta)/i;
  return pat.test(enunciado) || pat2.test(enunciado);
}

// ─── Display ───
function showQuestion(index) {
  if (index < 0 || index >= questoesFiltradas.length) return;
  currentIndex = index;
  const q = questoesFiltradas[index];

  // Verificar estado salvo
  const areaKey = getAreaKey(q);
  const prog = getProgQuestao(q.id, areaKey);
  answered = prog.respondida;

  document.getElementById('qIndex').textContent = index + 1;
  document.getElementById('qAcertos').textContent = acertos;
  document.getElementById('qErros').textContent = erros;

  // Meta
  document.getElementById('qArea').textContent = q.area || '';
  document.getElementById('qEspecialidade').textContent = q.especialidade || '';
  const fonte = q.fonte || (q._simulado ? `Estratégia MED ${q._simulado.replace('-simulado','')}ª Ed.` : '');
  document.getElementById('qFonte').textContent = fonte;
  const diff = q.dificuldade || 'Média';
  document.getElementById('qDificuldade').textContent = diff;
  document.getElementById('qFavStar').textContent = isFavorito(q.id) ? '⭐' : '☆';

  // Enunciado
  document.getElementById('qEnunciado').innerHTML = q.enunciado;

  // Imagem do enunciado (só se o texto referenciar)
  var imgBox = document.getElementById('qImagens');
  if (temImagemNoEnunciado(q.enunciado) && q.imagens && q.imagens.length > 0) {
    var src = q.imagens[0];
    imgBox.innerHTML = '<img src="' + src.replace(/'/g, "\\'") + '" alt="Imagem da questão" onclick="window.open(this.src)" loading="lazy">';
  } else {
    imgBox.innerHTML = '';
  }

  // Alternativas
  const altsEl = document.getElementById('qAlternativas');
  altsEl.innerHTML = '';
  const letras = ['A', 'B', 'C', 'D', 'E'];
  const alternativas = q.alternativas || {};

  letras.forEach(letra => {
    if (!alternativas[letra]) return;
    const btn = document.createElement('button');
    btn.className = 'alt-btn';
    btn.dataset.letra = letra;
    btn.innerHTML = `
      <span class="letter">${letra}</span>
      <span class="text">${alternativas[letra]}</span>
    `;
    btn.onclick = () => selectAlternative(letra);
    altsEl.appendChild(btn);
  });

  // Resets
  document.getElementById('qExplicacao').classList.remove('visible');
  document.getElementById('btnConfirm').style.display = '';
  document.getElementById('btnConfirm').disabled = true;
  document.getElementById('qActions').querySelectorAll('.btn-correct, .btn-wrong, .btn-outline').forEach(e => e.remove());

  // Navegação: Anterior
  document.getElementById('btnPrev').style.display = currentIndex > 0 ? '' : 'none';

  // Navegação: Pular (só quando não respondeu e não é a última)
  document.getElementById('btnSkip').style.display =
    !answered && currentIndex < questoesFiltradas.length - 1 ? '' : 'none';

  // Navegação: Próxima / Finalizar
  const btnNext = document.getElementById('btnNext');
  if (currentIndex < questoesFiltradas.length - 1) {
    btnNext.textContent = !answered ? '⏭️ Pular →' : 'Próxima →';
  } else {
    btnNext.textContent = answered ? '✅ Finalizar' : '⏭️ Pular';
  }

  // Se já respondida, restaurar estado visual
  if (answered) {
    const correta = q.correta;
    const selLetra = prog.selecao;
    document.querySelectorAll('.alt-btn').forEach(btn => {
      btn.classList.add('disabled');
      btn.onclick = null;
      const letra = btn.dataset.letra;
      if (letra === correta) btn.classList.add('correct');
      if (letra === selLetra && letra !== correta) btn.classList.add('wrong');
      if (letra === correta && letra !== selLetra && selLetra) btn.classList.add('show-correct');
    });

    // Mostrar explicação
    if (q.explicacao) {
      document.getElementById('qExplicacao').classList.add('visible');
      document.getElementById('qExplicacaoTexto').innerHTML = q.explicacao;
      const expImgBox = document.getElementById('qExpImagens');
      expImgBox.innerHTML = '';
      if (q.imagens && q.imagens.length > 0) {
        q.imagens.forEach(src => {
          const img = document.createElement('img');
          img.src = src;
          img.loading = 'lazy';
          img.onclick = () => window.open(src, '_blank');
          expImgBox.appendChild(img);
        });
      }
    }

    // Substituir Confirm por badge + Refazer
    document.getElementById('btnConfirm').style.display = 'none';
    document.getElementById('btnSkip').style.display = 'none';
    const actions = document.getElementById('qActions');
    // Remover badges antigos
    actions.querySelectorAll('.btn-correct, .btn-wrong, .btn-outline').forEach(e => e.remove());
    if (prog.acertou === true) {
      const badge = document.createElement('button');
      badge.className = 'btn btn-correct';
      badge.disabled = true;
      badge.textContent = '✅ Correto!';
      actions.insertBefore(badge, btnNext);
    } else if (prog.acertou === false) {
      const badge = document.createElement('button');
      badge.className = 'btn btn-wrong';
      badge.disabled = true;
      badge.textContent = `❌ Errado! (Resposta: ${correta})`;
      actions.insertBefore(badge, btnNext);
    }
    // Botão Refazer
    const refBtn = document.createElement('button');
    refBtn.className = 'btn btn-outline';
    refBtn.textContent = '🔄 Refazer';
    refBtn.onclick = () => {
      delProgQuestao(q.id, areaKey);
      showQuestion(currentIndex);
    };
    actions.insertBefore(refBtn, btnNext);

    // Botão Favoritar
    const favBtn = document.createElement('button');
    const isFav = isFavorito(q.id);
    favBtn.className = 'btn ' + (isFav ? 'btn-fav' : 'btn-outline');
    favBtn.textContent = isFav ? '⭐ Favorita' : '☆ Favoritar';
    favBtn.onclick = () => {
      const nova = toggleFavorito(q.id);
      favBtn.className = 'btn ' + (nova ? 'btn-fav' : 'btn-outline');
      favBtn.textContent = nova ? '⭐ Favorita' : '☆ Favoritar';
    };
    actions.insertBefore(favBtn, btnNext);
  }

  renderDots();
  document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth', block: 'start' });

  // Atualizar anotações
  atualizarNotas(q);
}

// ─── Selection ───
let selectedLetra = null;

function selectAlternative(letra) {
  if (answered) return;
  selectedLetra = letra;
  document.querySelectorAll('.alt-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.letra === letra);
  });
  document.getElementById('btnConfirm').disabled = false;
}

function confirmAnswer() {
  if (!selectedLetra || answered) return;
  answered = true;

  const q = questoesFiltradas[currentIndex];
  const correta = q.correta;
  const isCorrect = selectedLetra === correta;

  if (isCorrect) {
    acertos++;
  } else {
    erros++;
  }

  // Marcar alternativas
  document.querySelectorAll('.alt-btn').forEach(btn => {
    btn.classList.add('disabled');
    btn.onclick = null;
    const letra = btn.dataset.letra;
    if (letra === correta) btn.classList.add('correct');
    if (letra === selectedLetra && letra !== correta) btn.classList.add('wrong');
    if (letra === correta && letra !== selectedLetra) btn.classList.add('show-correct');
  });

  // Mostrar explicação
  if (q.explicacao) {
    document.getElementById('qExplicacao').classList.add('visible');
    document.getElementById('qExplicacaoTexto').innerHTML = q.explicacao;

    // Imagens da explicação
    const expImgBox = document.getElementById('qExpImagens');
    expImgBox.innerHTML = '';
    if (q.imagens && q.imagens.length > 0) {
      q.imagens.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.loading = 'lazy';
        img.onclick = () => window.open(src, '_blank');
        expImgBox.appendChild(img);
      });
    }
  }

  // Salvar progresso com a alternativa selecionada
  const areaKey = getAreaKey(q);
  setProgQuestao(q.id, areaKey, { acertou: isCorrect, selecao: selectedLetra });

  // Gerenciar revisão espaçada
  gerenciarRevisao(q, isCorrect);

  // Atualizar stats
  document.getElementById('qAcertos').textContent = acertos;
  document.getElementById('qErros').textContent = erros;
  renderDots();

  // Botões
  document.getElementById('btnConfirm').style.display = 'none';
  document.getElementById('btnSkip').style.display = 'none';
  // Atualizar texto do Próxima
  if (currentIndex < questoesFiltradas.length - 1) {
    document.getElementById('btnNext').textContent = 'Próxima →';
  } else {
    document.getElementById('btnNext').textContent = '✅ Finalizar';
  }

  const actions = document.getElementById('qActions');
  if (isCorrect) {
    const badge = document.createElement('button');
    badge.className = 'btn btn-correct';
    badge.disabled = true;
    badge.textContent = '✅ Correto!';
    actions.insertBefore(badge, document.getElementById('btnNext'));
  } else {
    const badge = document.createElement('button');
    badge.className = 'btn btn-wrong';
    badge.disabled = true;
    badge.textContent = `❌ Errado! (Resposta: ${correta})`;
    actions.insertBefore(badge, document.getElementById('btnNext'));

    // Botão pra marcar pra revisão
    if (modo !== 'revisao') {
      const revBtn = document.createElement('button');
      revBtn.className = 'btn btn-outline';
      revBtn.textContent = '📌 Revisar depois';
      revBtn.onclick = () => {
        const revisoes = JSON.parse(localStorage.getItem(REVISAO_KEY) || '{}');
        const hoje = new Date().toISOString().split('T')[0];
        revisoes[String(q.id)] = { proxima: hoje, nivel: 0, ultima: hoje };
        localStorage.setItem(REVISAO_KEY, JSON.stringify(revisoes));
        revBtn.textContent = '✅ Adicionado!';
        revBtn.disabled = true;
        revBtn.style.opacity = '0.5';
      };
      actions.insertBefore(revBtn, document.getElementById('btnNext'));
    }
  }

}

function previousQuestion() {
  if (currentIndex > 0) {
    // Se a questão atual já foi respondida, mostra ela com o estado salvo
    showQuestion(currentIndex - 1);
  }
}

function pularQuestao() {
  // Vai pra próxima sem registrar resposta
  if (currentIndex + 1 < questoesFiltradas.length) {
    showQuestion(currentIndex + 1);
  } else {
    mostrarResultado();
  }
}

function nextQuestion() {
  if (currentIndex + 1 < questoesFiltradas.length) {
    showQuestion(currentIndex + 1);
  } else {
    mostrarResultado();
  }
}

// ─── Favoritos ───
function toggleFavFromMeta() {
  const q = questoesFiltradas[currentIndex];
  if (!q) return;
  const nova = toggleFavorito(q.id);
  document.getElementById('qFavStar').textContent = nova ? '⭐' : '☆';
  renderDots();
}

// ─── Revisão espaçada ───
function gerenciarRevisao(q, isCorrect) {
  if (modo === 'revisao') {
    const sessoes = JSON.parse(localStorage.getItem(REVISAO_KEY) || '{}');
    const key = String(q.id);
    const sessao = sessoes[key];
    if (sessao) {
      const niveis = [1, 3, 7, 15, 30];
      if (isCorrect) {
        sessao.nivel = Math.min(sessao.nivel + 1, niveis.length - 1);
      } else {
        sessao.nivel = 0; // Reset if wrong
      }
      const dias = niveis[sessao.nivel];
      const proxima = new Date();
      proxima.setDate(proxima.getDate() + dias);
      sessao.proxima = proxima.toISOString().split('T')[0];
      sessao.ultima = new Date().toISOString().split('T')[0];
      sessoes[key] = sessao;
      localStorage.setItem(REVISAO_KEY, JSON.stringify(sessoes));
    }
  }
}

// ─── Progress dots ───
function renderDots() {
  const container = document.getElementById('progressDots');
  container.innerHTML = '';
  if (questoesFiltradas.length === 0) return;
  const areaKey = getAreaKey(questoesFiltradas[0]);

  questoesFiltradas.forEach((q, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    if (i === currentIndex) dot.classList.add('current');
    dot.textContent = i + 1;

    const prog = getProgQuestao(q.id, areaKey);
    if (prog.acertou === true) dot.classList.add('correct');
    else if (prog.acertou === false) dot.classList.add('wrong');
    else if (isFavorito(q.id)) dot.classList.add('fav');

    dot.onclick = () => showQuestion(i);
    container.appendChild(dot);
  });
}

// ─── Timer ───
function iniciarTimer() {
  timerSeconds = 0;
  timerInterval = setInterval(() => {
    timerSeconds++;
    const min = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
    const sec = String(timerSeconds % 60).padStart(2, '0');
    document.getElementById('qTimer').textContent = `${min}:${sec}`;
  }, 1000);
}

// ─── Result ───
function mostrarResultado() {
  if (timerInterval) clearInterval(timerInterval);

  const total = questoesFiltradas.length;
  const pct = total > 0 ? Math.round((acertos / total) * 100) : 0;

  document.getElementById('questionArea').style.display = 'none';
  document.getElementById('resultScreen').classList.add('visible');
  document.getElementById('resultScreen').style.display = '';
  document.getElementById('statsBar').style.display = 'none';
  document.getElementById('progressDots').style.display = 'none';
  document.getElementById('subFilter').style.display = 'none';
  document.getElementById('filterMode').style.display = 'none';
  document.getElementById('streakBar').style.display = 'none';
  document.getElementById('backToAreasLink').style.display = 'none';

  let icon, title;
  if (pct >= 80) { icon = '🏆'; title = 'Excelente!'; }
  else if (pct >= 60) { icon = '👏'; title = 'Bom trabalho!'; }
  else if (pct >= 40) { icon = '💪'; title = 'Continue praticando!'; }
  else { icon = '📚'; title = 'Hora de revisar!'; }

  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultScore').textContent = `${pct}%`;
  document.getElementById('resultText').textContent = `Você acertou ${acertos} de ${total} questões`;
  document.getElementById('rAcertos').textContent = acertos;
  document.getElementById('rErros').textContent = erros;
  document.getElementById('rAproveitamento').textContent = `${pct}%`;
}

function refazerArea() {
  if (areaAtual) {
    const progresso = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    delete progresso[areaAtual];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progresso));
  }
  location.reload();
}

// ─── Back to area grid ───
function voltarGrade() {
  document.getElementById('questionView').style.display = 'none';
  document.getElementById('areaGrid').style.display = 'grid';
  document.getElementById('filterMode').style.display = 'none';
  document.getElementById('streakBar').style.display = 'none';
  document.getElementById('resultScreen').classList.remove('visible');
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('questionArea').style.display = 'block';
  document.getElementById('statsBar').style.display = 'flex';
  document.getElementById('progressDots').style.display = 'flex';
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ─── Revisão Espaçada ───
async function carregarRevisao() {
  document.getElementById('pageTitle').textContent = 'Revisão Espaçada';
  document.getElementById('modeBadge').textContent = '📅 Revisão';
  const sessoes = JSON.parse(localStorage.getItem(REVISAO_KEY) || '{}');
  const hoje = new Date().toISOString().split('T')[0];
  const idsPendentes = Object.keys(sessoes).filter(id => sessoes[id].proxima <= hoje);

  if (idsPendentes.length === 0) {
    document.getElementById('pageSub').textContent = 'Nenhuma revisão pendente! 🎉';
    return;
  }

  // Carregar do arquivo da área atual ou de todas
  if (areaAtual) {
    try {
      const r = await fetch(`data/${areaAtual}.json`);
      const data = await r.json();
      questoes = data.questoes || [];
    } catch { questoes = []; }
  } else {
    questoes = [];
    const areas = Object.keys(assuntoData || {'clinica-medica':1,'cirurgia':1,'pediatria':1,'ginecologia':1,'medicina-preventiva':1});
    for (const a of areas) {
      try {
        const r = await fetch(`data/${a}.json`);
        if (!r.ok) continue;
        const data = await r.json();
        if (data.questoes) questoes = questoes.concat(data.questoes.map(q => ({...q, _area: a})));
      } catch {}
    }
  }

  questoesFiltradas = questoes.filter(q => idsPendentes.includes(String(q.id)));
  questoesFiltradas.sort((a, b) => {
    const da = sessoes[String(a.id)]?.proxima || '';
    const db = sessoes[String(b.id)]?.proxima || '';
    return da.localeCompare(db);
  });

  if (questoesFiltradas.length === 0) {
    document.getElementById('pageSub').textContent = 'Nenhuma revisão pendente! 🎉';
    return;
  }

  document.getElementById('areaGrid').style.display = 'none';
  document.getElementById('questionView').style.display = 'block';
  document.getElementById('subFilter').innerHTML = '';
  document.getElementById('qTotal').textContent = questoesFiltradas.length;
  document.getElementById('pageSub').textContent = `${questoesFiltradas.length} questões pendentes`;
  currentIndex = 0; acertos = 0; erros = 0; answered = false;
  renderDots();
  showQuestion(0);
}

// ─── Filter mode ───
function filtrarEstado(mode) {
  filtroEstado = mode;
  document.querySelectorAll('#filterMode .mode-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.mode === mode);
  });
  aplicarFiltros();
}

function toggleShuffle() {
  ordemEmbaralhada = !ordemEmbaralhada;
  document.getElementById('shuffleBtn').classList.toggle('active', ordemEmbaralhada);
  aplicarFiltros();
}

function aplicarFiltros() {
  let lista = [...questoes];

  // Filtro por estado
  const areaKey = getAreaKey(questoes[0]);
  if (filtroEstado === 'nao') {
    lista = lista.filter(q => !getProgQuestao(q.id, areaKey).respondida);
  } else if (filtroEstado === 'errou') {
    lista = lista.filter(q => getProgQuestao(q.id, areaKey).acertou === false);
  } else if (filtroEstado === 'acertou') {
    lista = lista.filter(q => getProgQuestao(q.id, areaKey).acertou === true);
  } else if (filtroEstado === 'favoritas') {
    lista = lista.filter(q => isFavorito(q.id));
  }

  // Subarea filter
  if (subareaFiltro) {
    const subNome = _lookupSubNome(subareaFiltro);
    lista = lista.filter(q => q.subarea && q.subarea.toLowerCase() === subNome.toLowerCase());
  }

  // Sub-subarea filter (drill-down)
  if (subSubareaFiltro) {
    lista = lista.filter(q => q.sub_subarea && q.sub_subarea === subSubareaFiltro);
  }

  // Shuffle
  if (ordemEmbaralhada) {
    for (let i = lista.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [lista[i], lista[j]] = [lista[j], lista[i]];
    }
  }

  questoesFiltradas = lista;
  currentIndex = 0;
  acertos = 0;
  erros = 0;
  answered = false;
  document.getElementById('qTotal').textContent = lista.length;
  document.getElementById('pageSub').textContent =
    subareaFiltro
      ? `${_lookupSubNome(subareaFiltro) || subareaFiltro} • ${lista.length} questões`
      : `${questoes.length} questões`;
  renderDots();
  showQuestion(0);
}

// ─── Notas ───
function salvarNotaAtual() {
  const q = questoesFiltradas[currentIndex];
  if (!q) return;
  const texto = document.getElementById('notasText').value;
  setNota(q.id, texto);
  const status = document.getElementById('notasStatus');
  status.textContent = '💾 Salva!';
  setTimeout(() => { status.textContent = ''; }, 2000);
}

function atualizarNotas(q) {
  const area = document.getElementById('notasArea');
  const texto = document.getElementById('notasText');
  const nota = getNota(q.id);
  if (nota) {
    texto.value = nota;
    area.classList.add('visible');
  } else {
    texto.value = '';
    area.classList.remove('visible');
  }
}

// ─── Lista Modal ───
let listaFilter = 'todas';

function abrirLista() {
  listaFilter = 'todas';
  document.getElementById('listaSearch').value = '';
  document.querySelectorAll('#listaFilterRow .modal-filter-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.f === 'todas');
  });
  renderizarLista();
  document.getElementById('listaModal').classList.add('visible');
}

function fecharLista() {
  document.getElementById('listaModal').classList.remove('visible');
}

function filtroLista(f) {
  listaFilter = f;
  document.querySelectorAll('#listaFilterRow .modal-filter-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.f === f);
  });
  renderizarLista();
}

function renderizarLista() {
  const body = document.getElementById('listaBody');
  const search = document.getElementById('listaSearch').value.toLowerCase();
  const areaKey = getAreaKey(questoesFiltradas[0] || questoes[0]);

  let items = questoesFiltradas.length > 0 ? questoesFiltradas : questoes;

  // Filtro da lista
  if (listaFilter === 'nao') {
    items = items.filter(q => !getProgQuestao(q.id, areaKey).respondida);
  } else if (listaFilter === 'errou') {
    items = items.filter(q => getProgQuestao(q.id, areaKey).acertou === false);
  } else if (listaFilter === 'acertou') {
    items = items.filter(q => getProgQuestao(q.id, areaKey).acertou === true);
  } else if (listaFilter === 'favoritas') {
    items = items.filter(q => isFavorito(q.id));
  }

  // Search
  if (search) {
    items = items.filter(q =>
      (q.enunciado || '').toLowerCase().includes(search) ||
      (q.area || '').toLowerCase().includes(search) ||
      (q.subarea || '').toLowerCase().includes(search)
    );
  }

  document.getElementById('listaCount').textContent = `(${items.length})`;

  if (items.length === 0) {
    body.innerHTML = '<div class="li-empty">Nenhuma questão encontrada</div>';
    return;
  }

  body.innerHTML = items.map((q, i) => {
    const prog = getProgQuestao(q.id, areaKey);
    const statusIcon = prog.acertou === true ? '✅' : prog.acertou === false ? '❌' : '⬜';
    const favIcon = isFavorito(q.id) ? '⭐' : '';
    const enunText = (q.enunciado || '').replace(/<[^>]*>/g, '').substring(0, 80);
    const enunFinal = enunText + (enunText.length >= 80 ? '...' : '');
    const areaNome = q.subarea || q.area || '';
    const qid = q.id;
    return `<div class="lista-item" data-qid="${qid}" onclick="irParaQuestaoDaLista(this, '${qid}')">
      <div class="li-num">${i + 1}</div>
      <div class="li-status">${statusIcon}</div>
      <div class="li-info">
        <div class="li-enun">${enunFinal}</div>
        <div class="li-meta">
          <span>${areaNome}</span>
          <span>${q.dificuldade || 'Média'}</span>
        </div>
      </div>
      <div class="li-fav">${favIcon}</div>
    </div>`;
  }).join('');
}

function irParaQuestaoDaLista(el, qid) {
  fecharLista();
  const lista = questoesFiltradas.length > 0 ? questoesFiltradas : questoes;
  const idx = lista.findIndex(q => String(q.id) === String(qid));
  if (idx >= 0) {
    currentIndex = idx;
    acertos = 0;
    erros = 0;
    answered = false;
    showQuestion(idx);
    document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ─── Streak ───
function atualizarStreak() {
  const hoje = new Date().toISOString().split('T')[0];
  const streak = JSON.parse(localStorage.getItem(STREAK_KEY) || '{"count":0,"ultimo":"","dias":{}}');
  
  if (streak.ultimo !== hoje) {
    const ontem = new Date();
    ontem.setDate(ontem.getDate() - 1);
    const ontemStr = ontem.toISOString().split('T')[0];
    
    if (streak.ultimo === ontemStr) {
      streak.count++;
    } else if (streak.ultimo !== hoje) {
      streak.count = 1;
    }
    streak.ultimo = hoje;
  }
  
  streak.dias = streak.dias || {};
  streak.dias[hoje] = (streak.dias[hoje] || 0) + 1;
  localStorage.setItem(STREAK_KEY, JSON.stringify(streak));
  
  // Atualizar UI
  const bar = document.getElementById('streakBar');
  if (streak.count > 0) {
    bar.style.display = 'flex';
    document.getElementById('streakCount').textContent = streak.count;
    // Progresso visual proporcional (max streak: 30 dias = 100%)
    const pct = Math.min(100, (streak.count / 30) * 100);
    document.getElementById('streakFill').style.width = pct + '%';
  }
}

// ─── Keyboard shortcuts ───
document.addEventListener('keydown', (e) => {
  // Não atalhos quando modal aberto
  if (document.getElementById('listaModal').classList.contains('visible')) {
    if (e.key === 'Escape') { fecharLista(); return; }
    return;
  }

  const q = questoesFiltradas[currentIndex];
  if (!q) return;

  if (e.key === 'Enter' && !answered && document.getElementById('btnConfirm').disabled === false) {
    confirmAnswer();
    e.preventDefault();
  } else if (e.key === 'Enter' && answered) {
    nextQuestion();
    e.preventDefault();
  } else if (['1','2','3','4','5'].includes(e.key)) {
    const idx = parseInt(e.key) - 1;
    const btns = document.querySelectorAll('.alt-btn');
    if (btns[idx]) btns[idx].click();
    e.preventDefault();
  } else if (e.key === 'ArrowRight' || e.key === 'n') {
    if (answered) nextQuestion();
    else if (!answered && currentIndex < questoesFiltradas.length - 1) pularQuestao();
    e.preventDefault();
  } else if (e.key === 'ArrowLeft' || e.key === 'p') {
    if (currentIndex > 0) previousQuestion();
    e.preventDefault();
  } else if (e.key === 'r' || e.key === 'R') {
    const refBtn = document.querySelector('#qActions .btn-outline');
    if (refBtn && refBtn.textContent.includes('Refazer')) refBtn.click();
    e.preventDefault();
  } else if (e.key === 'f' || e.key === 'F') {
    toggleFavFromMeta();
    e.preventDefault();
  } else if (e.key === ' ' || e.key === 'Escape') {
    if (answered) {
      const exp = document.getElementById('qExplicacao');
      exp.classList.toggle('visible');
    }
    e.preventDefault();
  }
});

// ─── Swipe gestures ───
let touchStartX = 0;
let touchEndX = 0;
let touchStartY = 0;
document.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, { passive: true });
document.addEventListener('touchend', (e) => {
  touchEndX = e.changedTouches[0].screenX;
  const diffX = touchStartX - touchEndX;
  const diffY = Math.abs(e.changedTouches[0].screenY - touchStartY);
  // Só swipe horizontal (não vertical, pra não conflitar com scroll)
  if (Math.abs(diffX) > 70 && diffY < 50) {
    if (diffX > 0) {
      // Swipe left → next
      if (answered && currentIndex < questoesFiltradas.length - 1) nextQuestion();
      else if (currentIndex < questoesFiltradas.length - 1) pularQuestao();
    } else {
      // Swipe right → previous
      if (currentIndex > 0) previousQuestion();
    }
  }
}, { passive: true });

// ─── Start ───
init();
